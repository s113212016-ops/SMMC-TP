<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMC-EMI / TP2 Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ---------------- CSS Variables ---------------- */
        :root[data-theme="dark"] {
            --bg-color: #050508;
            --card-bg: rgba(20, 20, 28, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f0;
            --text-sub: #a0a0b0;
            --accent: #00f3ff;
            --accent-alt: #bc13fe;
            --nav-bg: rgba(10, 10, 15, 0.6);
            --glow-color: rgba(0, 243, 255, 0.4);
            --noise-opacity: 0.04;
            --progress-bg: linear-gradient(90deg, var(--accent), var(--accent-alt));
        }

        :root[data-theme="light"] {
            --bg-color: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(0, 0, 0, 0.08);
            --text-main: #1a1a24;
            --text-sub: #505060;
            --accent: #0055ff;
            --accent-alt: #ff00aa;
            --nav-bg: rgba(255, 255, 255, 0.7);
            --glow-color: rgba(0, 85, 255, 0.3);
            --noise-opacity: 0.015;
            --progress-bg: linear-gradient(90deg, var(--accent), var(--accent-alt));
        }

        /* ---------------- Global Resets & Typography ---------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, .title-font {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
        }

        .accent { color: var(--accent); }
        .text-sub { color: var(--text-sub); }

        /* ---------------- Background Effects ---------------- */
        #plasma-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            opacity: var(--noise-opacity);
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            transition: width 0.2s, height 0.2s;
            display: none;
        }

        @media (hover: hover) and (pointer: fine) {
            .cursor-glow { display: block; }
        }

        /* ---------------- Progress Bar ---------------- */
        .top-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: var(--progress-bg);
            z-index: 10000;
            transition: width 0.1s ease-out;
            box-shadow: 0 0 10px var(--accent);
        }

        /* ---------------- Navigation ---------------- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1200px;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            border-radius: 40px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            margin-right: 20px;
        }

        .nav-links {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .nav-links::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s;
            position: relative;
            white-space: nowrap;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
            box-shadow: 0 0 8px var(--accent);
        }

        .nav-item:hover::before, .nav-item.active::before {
            width: 60%;
        }

        .nav-item.active {
            color: var(--accent);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
        }

        .controls { 
            display: flex; 
            gap: 8px; 
            margin-left: 20px; 
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: var(--card-border);
            transform: translateY(-2px);
        }

        .hamburger { display: none; }

        @media (max-width: 1024px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
        }

        .mobile-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 0;
            transition: max-height 0.4s;
        }

        .mobile-menu.open {
            max-height: 400px;
            border: 1px solid var(--card-border);
        }

        .mobile-menu .nav-item {
            padding: 16px 24px;
            border-bottom: 1px solid var(--card-border);
            white-space: normal;
        }

        /* ---------------- General Layout & Glass ---------------- */
        main {
            padding: 140px 5% 60px;
            max-width: 1300px;
            margin: 0 auto;
        }

        section {
            margin-bottom: 120px;
            padding-top: 40px;
        }

        .section-head {
            margin-bottom: 50px;
            text-align: center;
        }

        .section-head .eyebrow {
            font-size: 0.95rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: block;
        }

        .section-head h2 {
            font-size: clamp(3rem, 6vw, 4.5rem);
            background: linear-gradient(45deg, var(--text-main), var(--text-sub));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .section-head p {
            max-width: 800px;
            margin: 0 auto;
            color: var(--text-sub);
            font-size: 1.1rem;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        }

        .reveal-up {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s cubic-bezier(0.5, 0, 0, 1), transform 0.8s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        [data-tilt] {
            transition: transform 0.1s;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* ---------------- Section 1: Intro (Hero) ---------------- */
        .hero__grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .hero-main {
            padding: 50px 40px;
            text-align: center;
        }

        .hero-main h2 {
            font-size: clamp(3.5rem, 7vw, 5rem);
            margin: 10px 0 24px;
            line-height: 1.1;
        }

        .hero-main p {
            font-size: 1.15rem;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .hero-card {
            padding: 30px 20px;
            text-align: center;
            border-top: 3px solid var(--accent);
        }

        .hero-card .value {
            font-size: 3rem;
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .hero-card .label {
            font-size: 1rem;
            color: var(--text-sub);
        }

        /* ---------------- Section 2: Portfolio ---------------- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .product-grid .glass {
            padding: 40px 30px;
            border-left: 5px solid var(--accent);
        }

        .product-grid h4 {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .product-grid p {
            font-size: 1.05rem;
            line-height: 1.7;
        }

        /* ---------------- Section 3: Value Chain ---------------- */
        .value-chain-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 1024px) {
            .value-chain-grid { grid-template-columns: 1fr; }
        }

        .vc-column {
            padding: 40px;
        }

        .vc-column h3 {
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 2rem;
            text-align: center;
            border-bottom: 1px dashed var(--card-border);
            padding-bottom: 15px;
        }

        .vc-column.support h3 {
            color: var(--accent-alt);
        }

        .vc-item {
            margin-bottom: 30px;
            padding-left: 20px;
            border-left: 3px solid var(--accent);
        }

        .vc-column.support .vc-item {
            border-left-color: var(--accent-alt);
        }

        .vc-item h4 {
            font-size: 1.6rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .vc-item p {
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* ---------------- Section 4: Resources ---------------- */
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .flip-card {
            background: transparent;
            height: 250px;
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-radius: 16px;
        }

        .flip-card-front {
            border-bottom: 4px solid var(--accent);
        }

        .flip-card-front h4 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .flip-card-back {
            background: rgba(0, 243, 255, 0.05);
            transform: rotateY(180deg);
            border: 1px solid var(--accent);
        }

        .flip-card-back p {
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* ---------------- Section 5: Competencies ---------------- */
        .management-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 950px) {
            .management-layout { grid-template-columns: 1fr; }
        }

        .management-layout > div {
            padding: 40px;
        }

        .competency-list {
            list-style: none;
            margin-top: 20px;
        }

        .competency-list li {
            padding: 16px 16px 16px 36px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 16px;
            border-radius: 8px;
            position: relative;
            font-size: 1.1rem;
        }

        .competency-list li::before {
            content: '▹';
            position: absolute;
            left: 14px;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .partner-item {
            padding: 20px;
            border-left: 5px solid var(--accent-alt);
            background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent);
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }
        .partner-item h5 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 8px; }
        .partner-item p { font-size: 1.05rem; }

        /* ---------------- Section 6: Dynamics ---------------- */
        .phase-board {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .phase-card {
            display: flex;
            align-items: center;
            padding: 30px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .phase-card { flex-direction: column; text-align: center; }
            .phase-arrow { transform: rotate(90deg); margin: -10px 0; }
        }

        .phase-threat {
            flex: 1;
            padding: 24px;
            background: rgba(255, 50, 100, 0.05);
            border: 1px dashed rgba(255, 50, 100, 0.3);
            border-radius: 12px;
            width: 100%;
        }
        .phase-threat h4 { color: #ff3366; margin-bottom: 12px; font-size: 1.5rem; }

        .phase-arrow {
            font-size: 2.5rem;
            color: var(--accent-alt);
            font-weight: bold;
        }

        .phase-adjust {
            flex: 1;
            padding: 24px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px;
            width: 100%;
        }
        .phase-adjust h4 { color: var(--accent); margin-bottom: 12px; font-size: 1.5rem; }

        .phase-threat p, .phase-adjust p { font-size: 1.1rem; line-height: 1.6; }

        /* ---------------- Section 7: Sources ---------------- */
        .sources-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 950px) {
            .sources-layout { grid-template-columns: 1fr; }
        }

        .source-list {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .source-link {
            display: block;
            padding: 16px 20px;
            color: var(--text-main);
            text-decoration: none;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid var(--card-border);
            transition: all 0.3s;
            font-size: 1.05rem;
        }

        .source-link:hover {
            border-color: var(--accent);
            background: rgba(0, 243, 255, 0.05);
            transform: translateX(8px);
        }

        .disclosure-card {
            padding: 40px;
            border-top: 5px solid var(--accent-alt);
        }

        .disclosure-card h4 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent-alt);
        }

        .disclosure-card ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 1.05rem;
            color: var(--text-sub);
        }

        /* ---------------- Footer ---------------- */
        .footer-note {
            text-align: center;
            padding: 50px;
            border-top: 1px solid var(--card-border);
            color: var(--text-sub);
            font-size: 1rem;
            line-height: 1.8;
        }
    </style>
</head>

    <canvas id="plasma-canvas"></canvas>
    <div class="noise"></div>
    <div class="cursor-glow"></div>

    <!-- Navigation -->

        <div class="nav-container">
            <div class="logo">SMMC-EMI / TP2</div>

        // --- Interactions & Observers ---
        let observer;

        function initInteractions() {
            // 3D Tilt
            document.querySelectorAll('[data-tilt]').forEach(card => {
                card.addEventListener('pointermove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -5;
                    const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.01, 1.01, 1.01)`;
                });
                card.addEventListener('pointerleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
                });
            });

            // Reveal & Scroll Spy
            if (observer) observer.disconnect();
            observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        const id = entry.target.getAttribute('id');
                        document.querySelectorAll('.nav-item').forEach(link => {
                            link.classList.toggle('active', link.getAttribute('href') === `#${id}`);
                        });
                    }
                });
            }, { threshold: 0.15, rootMargin: "-10% 0px -20% 0px" });

            document.querySelectorAll('.reveal-up').forEach(sec => observer.observe(sec));
        }

            cursorGlow.style.top = e.clientY + 'px';
        });

        // --- Canvas Background ---
        const canvas = document.getElementById('plasma-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, orbs = [];

        function resizeCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Orb {
            constructor() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.r = Math.random() * 300 + 200;
                this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
                this.hue = Math.random() > 0.5 ? 190 : 280;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < -this.r) this.x = w + this.r; if (this.x > w + this.r) this.x = -this.r;
                if (this.y < -this.r) this.y = h + this.r; if (this.y > h + this.r) this.y = -this.r;
            }
            draw() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                const alpha = isDark ? 0.08 : 0.04;
                ctx.beginPath();
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
                grad.addColorStop(0, `hsla(${this.hue}, 100%, 50%, ${alpha})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 5; i++) orbs.push(new Orb());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            orbs.forEach(o => { o.update(); o.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Initial render
        render();

    </script>
</body>
</html>
